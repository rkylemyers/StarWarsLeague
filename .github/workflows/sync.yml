name: Sync Fleaflicker Transactions

on:
  schedule:
    - cron: '0 8,20 * * *' # Run twice a day (8 AM and 8 PM UTC)
  workflow_dispatch: # Allows manual triggers from the GitHub Actions tab

permissions:
  contents: write # Needed to commit and push changes back

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build CLI Tool
        run: |
          go build -o fleaflicker-cli

      - name: Sync Transaction Cache
        run: |
          ./fleaflicker-cli -cache docs/data/transactions_cache.json sync

      - name: Commit and Push Cache
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add --force docs/data/transactions_cache.json
          git diff-index --quiet HEAD || git commit -m "Auto-sync transactions data cache"
          git push
